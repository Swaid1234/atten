<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الحضور والانصراف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --card-bg: rgba(10, 10, 10, 0.75);
      --success: #2ecc71;
      --danger: #e74c3c;
      --radius: 18px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('YOUR_BACKGROUND_IMAGE.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(201,168,76,0.5);
    }
    #clock {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .cards {
      display: flex;
      gap: 20px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1 1 240px;
      max-width: 300px;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform .28s, box-shadow .28s, border-color .28s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.12), transparent 70%);
      pointer-events: none;
    }
    .card:hover:not(.disabled) {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.2);
    }
    .card:active:not(.disabled) { transform: scale(0.97); }
    .card-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
    .card-title { font-size: 1.35rem; font-weight: 700; color: var(--gold-light); }
    .card-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.6; }
    .card-time { font-size: 0.75rem; color: rgba(255,255,255,0.25); text-align: center; }

    .card.checkin:hover:not(.disabled)  { border-color: var(--success); box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(46,204,113,0.25); }
    .card.checkout:hover:not(.disabled) { border-color: var(--danger);  box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(231,76,60,0.25); }

    .card.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
      filter: grayscale(0.4);
    }

    .time-badge {
      font-size: 0.75rem;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 700;
    }
    .time-badge.open   { background: rgba(46,204,113,0.2);  color: #55efc4; border: 1px solid rgba(46,204,113,0.3); }
    .time-badge.closed { background: rgba(231,76,60,0.15);  color: #ff7675; border: 1px solid rgba(231,76,60,0.3); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="bg"></div>

<div class="wrapper">
  <div class="header">
    <h1>نظام الحضور والانصراف</h1>
    <div id="clock"></div>
  </div>

  <div class="cards">
    <div class="card checkin" id="card-checkin" onclick="go('checkin')">
      <div class="card-icon">✅</div>
      <div class="card-title">تسجيل الحضور</div>
      <div class="card-sub" id="sub-checkin"></div>
      <div class="time-badge" id="badge-checkin"></div>
      <div class="card-time" id="time-checkin"></div>
    </div>

    <div class="card checkout" id="card-checkout" onclick="go('checkout')">
      <div class="card-icon">🚪</div>
      <div class="card-title">تسجيل الانصراف</div>
      <div class="card-sub" id="sub-checkout"></div>
      <div class="time-badge" id="badge-checkout"></div>
      <div class="card-time" id="time-checkout"></div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  //  ⏰ عدّل التوقيتات هنا — الصيغة 24 ساعة
  // ============================================================
  const TIMES = {
    checkin: {
      start: { h: 7,  m: 0 },   // ← بداية وقت الحضور
      end:   { h: 9,  m: 0 },   // ← نهاية وقت الحضور
    },
    checkout: {
      start: { h: 16, m: 0 },   // ← بداية وقت الانصراف
      end:   { h: 18, m: 0 },   // ← نهاية وقت الانصراف
    },
  };

  const URLS = {
    checkin:  'https://forms.gle/ykv99FbvJip7Fhp99',
    checkout: 'https://forms.gle/FsHitkRbXJizgbZJ8',
  };
  // ============================================================

  function toMin(h, m) { return h * 60 + m; }

  function isOpen(type) {
    const now = new Date();
    const cur = toMin(now.getHours(), now.getMinutes());
    const s   = toMin(TIMES[type].start.h, TIMES[type].start.m);
    const e   = toMin(TIMES[type].end.h,   TIMES[type].end.m);
    return cur >= s && cur <= e;
  }

  function fmt(h, m) {
    const s = h < 12 ? 'ص' : 'م';
    const hh = h % 12 || 12;
    return `${hh}:${String(m).padStart(2,'0')} ${s}`;
  }

  function updateCards() {
    ['checkin','checkout'].forEach(type => {
      const card  = document.getElementById('card-' + type);
      const badge = document.getElementById('badge-' + type);
      const sub   = document.getElementById('sub-' + type);
      const timeEl= document.getElementById('time-' + type);
      const t     = TIMES[type];
      const open  = isOpen(type);

      timeEl.textContent = `${fmt(t.start.h, t.start.m)} — ${fmt(t.end.h, t.end.m)}`;

      if (open) {
        card.classList.remove('disabled');
        badge.className = 'time-badge open';
        badge.textContent = '🟢 مفتوح الآن';
        sub.textContent = type === 'checkin'
          ? 'اضغط للانتقال لنموذج الحضور'
          : 'اضغط للانتقال لنموذج الانصراف';
      } else {
        card.classList.add('disabled');
        badge.className = 'time-badge closed';
        badge.textContent = '🔴 خارج وقت التسجيل';
        sub.textContent = type === 'checkin'
          ? 'وقت الحضور انتهى أو لم يبدأ بعد'
          : 'وقت الانصراف انتهى أو لم يبدأ بعد';
      }
    });
  }

  function go(type) {
    if (!isOpen(type)) return;
    window.location.href = URLS[type];
  }

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) +
      '  |  ' + new Date().toLocaleTimeString('ar-SA');
  }

  updateClock();
  updateCards();
  setInterval(updateClock, 1000);
  setInterval(updateCards, 30000);
</script>
</body>
</html>
